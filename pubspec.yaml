name: angomovie_iptv
description: AngoMovie IPTV - Tv ao Vivo gratuitamente 
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
dependencies:
  flutter:
    sdk: flutter

  flutter_vlc_player: ^7.4.1
  http: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  android_intent_plus: ^5.0.2
  connectivity_plus: ^6.1.4
  wakelock_plus: ^1.2.8
  path_provider: ^2.1.1
  cupertino_icons: ^1.0.8

  # NOVAS DEPENDÊNCIAS PARA ATUALIZAÇÃO OTA
  package_info_plus: ^8.1.2  # Lê a versão atual do app automaticamente
  url_launcher: ^6.3.1       # Abre o navegador para download do APK

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
