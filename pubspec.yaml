name: angomovie_iptv
description: AngoMovie IPTV - Tv ao Vivo gratuitamente 
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video Player
  video_player: ^2.9.3
  chewie: ^1.8.5

  # HTTP & Networking
  http: 1.5.0
  dio: ^5.7.0

  # Local Storage
  hive: 2.2.3
  hive_flutter: 1.1.0

  # State Management
  provider: 6.1.5+1

  # Image Loading
  cached_network_image: ^3.4.1

  # Shared Preferences
  shared_preferences: 2.5.3

  # Connectivity
  connectivity_plus: ^6.1.4

  # Wakelock
  wakelock_plus: ^1.3.1

  # Path Provider (for crash logs)
  path_provider: ^2.1.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
